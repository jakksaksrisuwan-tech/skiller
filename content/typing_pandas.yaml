snippets:
  # ── import + i/o ─────────────────────────────────────────────────
  - id: tp-import
    structure: pd_import
    language: pandas
    difficulty: 1
    text: "import pandas as pd"
    description: "Canonical pandas import alias."
    tags: [pandas, import]
  - id: tp-read-csv
    structure: pd_read_csv
    language: pandas
    difficulty: 2
    text: "df = pd.read_csv('data.csv')"
    description: "Read CSV into a DataFrame."
    tags: [pandas, io]
  - id: tp-read-csv-opts
    structure: pd_read_csv_opts
    language: pandas
    difficulty: 3
    text: "df = pd.read_csv('data.csv', sep=';', dtype={'id': int})"
    description: "Custom separator + per-column dtype."
    tags: [pandas, io, dtype]
  - id: tp-read-parquet
    structure: pd_read_parquet
    language: pandas
    difficulty: 3
    text: "df = pd.read_parquet('data.parquet')"
    description: "Read Parquet — columnar, typed, compressed."
    tags: [pandas, io]
  - id: tp-read-json
    structure: pd_read_json
    language: pandas
    difficulty: 3
    text: "df = pd.read_json('data.json', lines=True)"
    description: "Read newline-delimited JSON."
    tags: [pandas, io]
  - id: tp-read-excel
    structure: pd_read_excel
    language: pandas
    difficulty: 3
    text: "df = pd.read_excel('book.xlsx', sheet_name='Q1')"
    description: "Read a specific Excel sheet."
    tags: [pandas, io]
  - id: tp-read-sql
    structure: pd_read_sql
    language: pandas
    difficulty: 3
    text: "df = pd.read_sql('SELECT * FROM t', con=conn)"
    description: "Pull a query result into a DataFrame."
    tags: [pandas, io]
  - id: tp-to-csv
    structure: pd_to_csv
    language: pandas
    difficulty: 2
    text: "df.to_csv('out.csv', index=False)"
    description: "Write without the index column."
    tags: [pandas, io]
  - id: tp-to-parquet
    structure: pd_to_parquet
    language: pandas
    difficulty: 3
    text: "df.to_parquet('out.parquet', compression='zstd')"
    description: "Write Parquet with zstd compression."
    tags: [pandas, io]
  - id: tp-to-json
    structure: pd_to_json
    language: pandas
    difficulty: 3
    text: "df.to_json('out.json', orient='records', lines=True)"
    description: "Newline-delimited JSON for streaming."
    tags: [pandas, io]

  # ── creation ─────────────────────────────────────────────────────
  - id: tp-series-list
    structure: pd_series_list
    language: pandas
    difficulty: 1
    text: "s = pd.Series([1, 2, 3])"
    description: "Series from a list."
    tags: [pandas, creation, series]
  - id: tp-series-dict
    structure: pd_series_dict
    language: pandas
    difficulty: 2
    text: "s = pd.Series({'a': 1, 'b': 2})"
    description: "Series from dict — keys become index."
    tags: [pandas, creation, series]
  - id: tp-series-named
    structure: pd_series_named
    language: pandas
    difficulty: 2
    text: "s = pd.Series(vals, name='score')"
    description: "Named Series — name carries through joins."
    tags: [pandas, creation, series]
  - id: tp-df-dict
    structure: pd_df_dict
    language: pandas
    difficulty: 2
    text: "df = pd.DataFrame({'a': [1, 2], 'b': [3, 4]})"
    description: "DataFrame from column dict."
    tags: [pandas, creation]
  - id: tp-df-records
    structure: pd_df_records
    language: pandas
    difficulty: 2
    text: "df = pd.DataFrame.from_records(rows)"
    description: "DataFrame from a list of row tuples/dicts."
    tags: [pandas, creation]
  - id: tp-df-numpy
    structure: pd_df_numpy
    language: pandas
    difficulty: 3
    text: "df = pd.DataFrame(X, columns=['a', 'b', 'c'])"
    description: "Wrap a NumPy array with named columns."
    tags: [pandas, creation]
  - id: tp-empty-df
    structure: pd_empty_df
    language: pandas
    difficulty: 2
    text: "df = pd.DataFrame(columns=['a', 'b'])"
    description: "Empty frame with predeclared columns."
    tags: [pandas, creation]

  # ── inspection ───────────────────────────────────────────────────
  - id: tp-head
    structure: pd_head
    language: pandas
    difficulty: 1
    text: "df.head(10)"
    description: "First N rows."
    tags: [pandas, inspect]
  - id: tp-tail
    structure: pd_tail
    language: pandas
    difficulty: 1
    text: "df.tail(5)"
    description: "Last N rows."
    tags: [pandas, inspect]
  - id: tp-info
    structure: pd_info
    language: pandas
    difficulty: 1
    text: "df.info()"
    description: "Schema + memory + non-null counts."
    tags: [pandas, inspect]
  - id: tp-describe
    structure: pd_describe
    language: pandas
    difficulty: 2
    text: "df.describe(include='all')"
    description: "Summary stats including object/categorical."
    tags: [pandas, inspect]
  - id: tp-shape
    structure: pd_shape
    language: pandas
    difficulty: 1
    text: "rows, cols = df.shape"
    description: "Frame dimensions."
    tags: [pandas, inspect]
  - id: tp-dtypes
    structure: pd_dtypes
    language: pandas
    difficulty: 1
    text: "df.dtypes"
    description: "Per-column dtypes."
    tags: [pandas, inspect, dtype]
  - id: tp-columns
    structure: pd_columns
    language: pandas
    difficulty: 1
    text: "cols = df.columns.tolist()"
    description: "Column index as list."
    tags: [pandas, inspect]
  - id: tp-index
    structure: pd_index
    language: pandas
    difficulty: 1
    text: "idx = df.index"
    description: "Row index object."
    tags: [pandas, inspect]
  - id: tp-memory
    structure: pd_memory
    language: pandas
    difficulty: 3
    text: "df.memory_usage(deep=True).sum()"
    description: "True memory incl. object data (bytes)."
    tags: [pandas, inspect]
  - id: tp-sample
    structure: pd_sample
    language: pandas
    difficulty: 2
    text: "df.sample(n=5, random_state=42)"
    description: "Random N rows with a seed."
    tags: [pandas, inspect]

  # ── selection / indexing ─────────────────────────────────────────
  - id: tp-col
    structure: pd_col
    language: pandas
    difficulty: 1
    text: "s = df['a']"
    description: "Single column as Series."
    tags: [pandas, select]
  - id: tp-cols
    structure: pd_cols
    language: pandas
    difficulty: 2
    text: "sub = df[['a', 'b', 'c']]"
    description: "Multiple columns — note double brackets."
    tags: [pandas, select]
  - id: tp-loc-label
    structure: pd_loc_label
    language: pandas
    difficulty: 2
    text: "row = df.loc['x']"
    description: "Row by label."
    tags: [pandas, select, loc]
  - id: tp-loc-slice
    structure: pd_loc_slice
    language: pandas
    difficulty: 3
    text: "sub = df.loc['a':'c', ['x', 'y']]"
    description: "Label slice rows + column list."
    tags: [pandas, select, loc]
  - id: tp-iloc-row
    structure: pd_iloc_row
    language: pandas
    difficulty: 2
    text: "row = df.iloc[0]"
    description: "Row by positional index."
    tags: [pandas, select, iloc]
  - id: tp-iloc-slice
    structure: pd_iloc_slice
    language: pandas
    difficulty: 3
    text: "sub = df.iloc[0:5, 1:3]"
    description: "Positional row and column slice."
    tags: [pandas, select, iloc]
  - id: tp-iloc-fancy
    structure: pd_iloc_fancy
    language: pandas
    difficulty: 3
    text: "rows = df.iloc[[0, 2, -1]]"
    description: "Fancy positional row pick."
    tags: [pandas, select, iloc]
  - id: tp-at
    structure: pd_at
    language: pandas
    difficulty: 3
    text: "v = df.at[idx, 'price']"
    description: "Single cell by label — fastest scalar access."
    tags: [pandas, select]
  - id: tp-iat
    structure: pd_iat
    language: pandas
    difficulty: 3
    text: "v = df.iat[0, 2]"
    description: "Single cell by positions — fastest positional."
    tags: [pandas, select]
  - id: tp-attr-access
    structure: pd_attr_access
    language: pandas
    difficulty: 2
    text: "s = df.column_name"
    description: "Attribute-style column access (only if name is identifier)."
    tags: [pandas, select]
  - id: tp-set-cell
    structure: pd_set_cell
    language: pandas
    difficulty: 3
    text: "df.loc[idx, 'price'] = 9.99"
    description: "Set a cell by label."
    tags: [pandas, select]
  - id: tp-bool-mask
    structure: pd_bool_mask
    language: pandas
    difficulty: 2
    text: "sub = df[df['x'] > 0]"
    description: "Boolean masking — keep matching rows."
    tags: [pandas, select, mask]
  - id: tp-and-mask
    structure: pd_and_mask
    language: pandas
    difficulty: 3
    text: "sub = df[(df['x'] > 0) & (df['y'] < 10)]"
    description: "AND mask — wrap each clause in parens."
    tags: [pandas, select, mask]
  - id: tp-or-mask
    structure: pd_or_mask
    language: pandas
    difficulty: 3
    text: "sub = df[(df['x'] > 0) | (df['x'].isna())]"
    description: "OR with isna() — handle missing."
    tags: [pandas, select, mask]
  - id: tp-isin
    structure: pd_isin
    language: pandas
    difficulty: 2
    text: "sub = df[df['k'].isin(['a', 'b', 'c'])]"
    description: "Filter rows whose value is in a set."
    tags: [pandas, select, mask]
  - id: tp-between
    structure: pd_between
    language: pandas
    difficulty: 3
    text: "sub = df[df['x'].between(0, 1, inclusive='both')]"
    description: "Range filter — endpoints included."
    tags: [pandas, select, mask]
  - id: tp-query
    structure: pd_query
    language: pandas
    difficulty: 3
    text: "sub = df.query('x > 0 and y < 10')"
    description: "Pandas query string — cleaner for compound filters."
    tags: [pandas, select, mask]
  - id: tp-where
    structure: pd_where
    language: pandas
    difficulty: 3
    text: "out = df.where(df > 0, other=0)"
    description: "Keep elements where cond is True, else other."
    tags: [pandas, select, mask]
  - id: tp-mask-method
    structure: pd_mask_method
    language: pandas
    difficulty: 3
    text: "out = df.mask(df < 0, other=0)"
    description: "Inverse of where — replace where cond True."
    tags: [pandas, select, mask]

  # ── missing data ─────────────────────────────────────────────────
  - id: tp-isna
    structure: pd_isna
    language: pandas
    difficulty: 1
    text: "mask = df['x'].isna()"
    description: "Boolean mask of missing values."
    tags: [pandas, missing]
  - id: tp-notna
    structure: pd_notna
    language: pandas
    difficulty: 1
    text: "mask = df['x'].notna()"
    description: "Boolean mask of present values."
    tags: [pandas, missing]
  - id: tp-fillna-scalar
    structure: pd_fillna_scalar
    language: pandas
    difficulty: 2
    text: "df['x'] = df['x'].fillna(0)"
    description: "Replace NaN with a scalar."
    tags: [pandas, missing]
  - id: tp-fillna-method
    structure: pd_fillna_method
    language: pandas
    difficulty: 3
    text: "df = df.fillna(method='ffill')"
    description: "Forward-fill last valid observation."
    tags: [pandas, missing]
  - id: tp-fillna-dict
    structure: pd_fillna_dict
    language: pandas
    difficulty: 3
    text: "df = df.fillna({'x': 0, 'y': df['y'].mean()})"
    description: "Per-column fill values."
    tags: [pandas, missing]
  - id: tp-dropna-any
    structure: pd_dropna_any
    language: pandas
    difficulty: 2
    text: "clean = df.dropna()"
    description: "Drop rows with any NaN."
    tags: [pandas, missing]
  - id: tp-dropna-subset
    structure: pd_dropna_subset
    language: pandas
    difficulty: 3
    text: "clean = df.dropna(subset=['x', 'y'])"
    description: "Drop rows missing the listed columns."
    tags: [pandas, missing]
  - id: tp-dropna-thresh
    structure: pd_dropna_thresh
    language: pandas
    difficulty: 3
    text: "keep = df.dropna(thresh=3)"
    description: "Keep rows with at least 3 non-null cells."
    tags: [pandas, missing]
  - id: tp-interpolate
    structure: pd_interpolate
    language: pandas
    difficulty: 3
    text: "df = df.interpolate(method='linear')"
    description: "Linearly interpolate gaps."
    tags: [pandas, missing]
  - id: tp-replace
    structure: pd_replace
    language: pandas
    difficulty: 2
    text: "df = df.replace({'?': None, 'N/A': None})"
    description: "Replace sentinels with NaN."
    tags: [pandas, missing]

  # ── duplicates ───────────────────────────────────────────────────
  - id: tp-duplicated
    structure: pd_duplicated
    language: pandas
    difficulty: 2
    text: "mask = df.duplicated(subset=['id'])"
    description: "Mark rows whose key appeared earlier."
    tags: [pandas, dedup]
  - id: tp-drop-dup
    structure: pd_drop_dup
    language: pandas
    difficulty: 2
    text: "df = df.drop_duplicates(subset=['id'], keep='last')"
    description: "Keep the most recent record per id."
    tags: [pandas, dedup]

  # ── dtype / conversion ───────────────────────────────────────────
  - id: tp-astype-col
    structure: pd_astype_col
    language: pandas
    difficulty: 2
    text: "df['n'] = df['n'].astype('int64')"
    description: "Cast a column to int64."
    tags: [pandas, dtype]
  - id: tp-astype-cat
    structure: pd_astype_cat
    language: pandas
    difficulty: 3
    text: "df['k'] = df['k'].astype('category')"
    description: "Cast to categorical — saves memory for low-card cols."
    tags: [pandas, dtype, categorical]
  - id: tp-to-numeric
    structure: pd_to_numeric
    language: pandas
    difficulty: 3
    text: "df['n'] = pd.to_numeric(df['n'], errors='coerce')"
    description: "Coerce strings to numbers, bad values → NaN."
    tags: [pandas, dtype]
  - id: tp-to-datetime
    structure: pd_to_datetime
    language: pandas
    difficulty: 3
    text: "df['ts'] = pd.to_datetime(df['ts'], utc=True)"
    description: "Parse strings into timezone-aware datetimes."
    tags: [pandas, dtype, datetime]
  - id: tp-to-timedelta
    structure: pd_to_timedelta
    language: pandas
    difficulty: 3
    text: "df['dur'] = pd.to_timedelta(df['dur'], unit='s')"
    description: "Build timedeltas from seconds."
    tags: [pandas, dtype, datetime]
  - id: tp-convert-dtypes
    structure: pd_convert_dtypes
    language: pandas
    difficulty: 3
    text: "df = df.convert_dtypes()"
    description: "Promote to nullable pandas dtypes (Int64, string, boolean)."
    tags: [pandas, dtype]

  # ── arithmetic / element-wise ────────────────────────────────────
  - id: tp-arith-cols
    structure: pd_arith_cols
    language: pandas
    difficulty: 1
    text: "df['z'] = df['x'] + df['y']"
    description: "Element-wise add into a new column."
    tags: [pandas, arithmetic]
  - id: tp-arith-mul
    structure: pd_arith_mul
    language: pandas
    difficulty: 1
    text: "df['rev'] = df['price'] * df['qty']"
    description: "Compute revenue per row."
    tags: [pandas, arithmetic]
  - id: tp-arith-scalar
    structure: pd_arith_scalar
    language: pandas
    difficulty: 1
    text: "df['x_pct'] = df['x'] / df['x'].sum()"
    description: "Normalize a column by its total."
    tags: [pandas, arithmetic]
  - id: tp-arith-log
    structure: pd_arith_log
    language: pandas
    difficulty: 2
    text: "df['logx'] = np.log1p(df['x'])"
    description: "log(1+x) — safe at 0."
    tags: [pandas, arithmetic, numpy]
  - id: tp-clip
    structure: pd_clip
    language: pandas
    difficulty: 2
    text: "df['x'] = df['x'].clip(lower=0, upper=100)"
    description: "Bound values to a range."
    tags: [pandas, arithmetic]
  - id: tp-round
    structure: pd_round
    language: pandas
    difficulty: 2
    text: "df['x'] = df['x'].round(3)"
    description: "Round to N decimals."
    tags: [pandas, arithmetic]
  - id: tp-rank
    structure: pd_rank
    language: pandas
    difficulty: 3
    text: "df['r'] = df['score'].rank(method='dense', ascending=False)"
    description: "Dense rank — no gaps on ties."
    tags: [pandas, arithmetic]
  - id: tp-pct-change
    structure: pd_pct_change
    language: pandas
    difficulty: 3
    text: "df['ret'] = df['price'].pct_change()"
    description: "Percent change vs prior row — returns."
    tags: [pandas, arithmetic]
  - id: tp-shift
    structure: pd_shift
    language: pandas
    difficulty: 3
    text: "df['lag1'] = df['x'].shift(1)"
    description: "Shift values down by N (introduces NaN at top)."
    tags: [pandas, arithmetic]
  - id: tp-diff
    structure: pd_diff
    language: pandas
    difficulty: 3
    text: "df['dx'] = df['x'].diff()"
    description: "First-difference series."
    tags: [pandas, arithmetic]
  - id: tp-cumsum
    structure: pd_cumsum
    language: pandas
    difficulty: 3
    text: "df['running'] = df['x'].cumsum()"
    description: "Running total."
    tags: [pandas, arithmetic]
  - id: tp-where-scalar
    structure: pd_where_scalar
    language: pandas
    difficulty: 3
    text: "df['x'] = df['x'].where(df['x'] >= 0, 0)"
    description: "Per-element clip to zero from below."
    tags: [pandas, arithmetic, mask]

  # ── apply / map ──────────────────────────────────────────────────
  - id: tp-apply-col
    structure: pd_apply_col
    language: pandas
    difficulty: 3
    text: "df['n'] = df['s'].apply(len)"
    description: "Apply a callable element-wise to a Series."
    tags: [pandas, apply]
  - id: tp-apply-lambda
    structure: pd_apply_lambda
    language: pandas
    difficulty: 3
    text: "df['x2'] = df['x'].apply(lambda v: v * v)"
    description: "Lambda for ad-hoc transforms."
    tags: [pandas, apply, lambda]
  - id: tp-apply-row
    structure: pd_apply_row
    language: pandas
    difficulty: 3
    text: "df['z'] = df.apply(lambda r: r['x'] + r['y'], axis=1)"
    description: "Row-wise apply — slower but flexible."
    tags: [pandas, apply, lambda]
  - id: tp-map-dict
    structure: pd_map_dict
    language: pandas
    difficulty: 2
    text: "df['name'] = df['code'].map({'A': 'Alpha', 'B': 'Beta'})"
    description: "Map values via a lookup dict."
    tags: [pandas, apply]
  - id: tp-replace-regex
    structure: pd_replace_regex
    language: pandas
    difficulty: 3
    text: "df['s'] = df['s'].replace(r'\\s+', ' ', regex=True)"
    description: "Collapse runs of whitespace via regex."
    tags: [pandas, apply]
  - id: tp-pipe
    structure: pd_pipe
    language: pandas
    difficulty: 3
    text: "out = df.pipe(clean).pipe(featurize, n=5)"
    description: "Chain functions — keeps method-call style."
    tags: [pandas, apply]
  - id: tp-assign
    structure: pd_assign
    language: pandas
    difficulty: 3
    text: "df = df.assign(z=lambda d: d['x'] + d['y'])"
    description: "Add/overwrite columns inside a chain."
    tags: [pandas, apply]

  # ── string accessor ──────────────────────────────────────────────
  - id: tp-str-lower
    structure: pd_str_lower
    language: pandas
    difficulty: 1
    text: "df['s'] = df['s'].str.lower()"
    description: "Lowercase via .str accessor."
    tags: [pandas, string]
  - id: tp-str-strip
    structure: pd_str_strip
    language: pandas
    difficulty: 1
    text: "df['s'] = df['s'].str.strip()"
    description: "Trim leading/trailing whitespace."
    tags: [pandas, string]
  - id: tp-str-contains
    structure: pd_str_contains
    language: pandas
    difficulty: 3
    text: "mask = df['s'].str.contains(r'^foo', regex=True, na=False)"
    description: "Regex match — treat NaN as False."
    tags: [pandas, string, mask]
  - id: tp-str-startswith
    structure: pd_str_startswith
    language: pandas
    difficulty: 2
    text: "mask = df['s'].str.startswith('prefix_')"
    description: "Literal prefix check."
    tags: [pandas, string, mask]
  - id: tp-str-extract
    structure: pd_str_extract
    language: pandas
    difficulty: 3
    text: "df[['k', 'v']] = df['s'].str.extract(r'(\\w+)=(\\w+)')"
    description: "Capture groups into new columns."
    tags: [pandas, string]
  - id: tp-str-split
    structure: pd_str_split
    language: pandas
    difficulty: 3
    text: "df[['a', 'b']] = df['s'].str.split('/', n=1, expand=True)"
    description: "Split into separate columns."
    tags: [pandas, string]
  - id: tp-str-replace
    structure: pd_str_replace
    language: pandas
    difficulty: 3
    text: "df['s'] = df['s'].str.replace(',', '', regex=False)"
    description: "Strip commas from text."
    tags: [pandas, string]
  - id: tp-str-len
    structure: pd_str_len
    language: pandas
    difficulty: 1
    text: "df['n'] = df['s'].str.len()"
    description: "Per-row string length."
    tags: [pandas, string]
  - id: tp-str-cat
    structure: pd_str_cat
    language: pandas
    difficulty: 3
    text: "df['full'] = df['first'].str.cat(df['last'], sep=' ')"
    description: "Concatenate two string Series."
    tags: [pandas, string]
  - id: tp-get-dummies
    structure: pd_get_dummies
    language: pandas
    difficulty: 3
    text: "X = pd.get_dummies(df, columns=['k'], drop_first=True)"
    description: "One-hot encode categorical columns."
    tags: [pandas, string, categorical]

  # ── datetime accessor ────────────────────────────────────────────
  - id: tp-dt-year
    structure: pd_dt_year
    language: pandas
    difficulty: 1
    text: "df['y'] = df['ts'].dt.year"
    description: "Extract year via .dt accessor."
    tags: [pandas, datetime]
  - id: tp-dt-dow
    structure: pd_dt_dow
    language: pandas
    difficulty: 2
    text: "df['dow'] = df['ts'].dt.day_name()"
    description: "Day-of-week names."
    tags: [pandas, datetime]
  - id: tp-dt-floor
    structure: pd_dt_floor
    language: pandas
    difficulty: 3
    text: "df['hour'] = df['ts'].dt.floor('H')"
    description: "Truncate timestamps to the hour."
    tags: [pandas, datetime]
  - id: tp-dt-tz
    structure: pd_dt_tz
    language: pandas
    difficulty: 3
    text: "df['ts'] = df['ts'].dt.tz_convert('Asia/Bangkok')"

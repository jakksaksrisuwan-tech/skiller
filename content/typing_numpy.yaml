    tags: [numpy, linalg]
  - id: tn-norm-axis
    structure: np_norm_axis
    language: numpy
    difficulty: 3
    text: "row_norms = np.linalg.norm(A, axis=1)"
    description: "Per-row L2 norm — useful for unit vectors."

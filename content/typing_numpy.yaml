  - id: tn-matmul-fn
    structure: np_matmul_fn
    language: numpy
    difficulty: 2
    text: "C = np.matmul(A, B)"
    description: "Matrix product function form."
    tags: [numpy, matrix, linalg]
  - id: tn-dot
    structure: np_dot
    language: numpy
    difficulty: 2
    text: "c = np.dot(u, v)"
    description: "Dot product of 1-D vectors."
    tags: [numpy, matrix, linalg]
  - id: tn-inner
    structure: np_inner
    language: numpy
    difficulty: 3
    text: "g = np.inner(A, B)"
    description: "Sum over last axis (1-D inner / batched contraction)."
    tags: [numpy, matrix, linalg]
  - id: tn-outer
    structure: np_outer
    language: numpy
    difficulty: 3
    text: "K = np.outer(u, v)"
    description: "Outer product — column × row → matrix."
    tags: [numpy, matrix, linalg]
  - id: tn-cross
    structure: np_cross
    language: numpy
    difficulty: 3
    text: "c = np.cross(u, v)"
    description: "Vector cross product (3-D)."
    tags: [numpy, linalg]
  - id: tn-trace
    structure: np_trace
    language: numpy
    difficulty: 2
    text: "t = np.trace(A)"
    description: "Sum of diagonal entries."
    tags: [numpy, linalg]
  - id: tn-diag
    structure: np_diag
    language: numpy
    difficulty: 2
    text: "d = np.diag(A)"
    description: "Extract diagonal vector (or build diag matrix from vector)."

  - id: tn-det
    structure: np_det
    language: numpy
    difficulty: 3
    text: "d = np.linalg.det(A)"
    description: "Determinant of square matrix."
    tags: [numpy, linalg]
  - id: tn-inv
    structure: np_inv
    language: numpy
    difficulty: 3
    text: "Ai = np.linalg.inv(A)"
    description: "Matrix inverse — beware singular!"
    tags: [numpy, linalg]
  - id: tn-pinv
    structure: np_pinv
    language: numpy
    difficulty: 3
    text: "Ap = np.linalg.pinv(A)"
    description: "Moore-Penrose pseudoinverse."
    tags: [numpy, linalg]
  - id: tn-solve
    structure: np_solve
    language: numpy
    difficulty: 3
    text: "x = np.linalg.solve(A, b)"
    description: "Solve Ax = b without forming A^-1."
    tags: [numpy, linalg]
  - id: tn-lstsq
    structure: np_lstsq
    language: numpy
    difficulty: 3
    text: "x, *_ = np.linalg.lstsq(A, b, rcond=None)"
    description: "Least-squares solution to over/under-determined system."
    tags: [numpy, linalg]
  - id: tn-norm
    structure: np_norm
    language: numpy
    difficulty: 3
    text: "n = np.linalg.norm(v, ord=2)"

  - id: tn-eig
    structure: np_eig
    language: numpy
    difficulty: 3
    text: "w, V = np.linalg.eig(A)"
    description: "Eigenvalues and eigenvectors (general)."
    tags: [numpy, linalg]
  - id: tn-eigh
    structure: np_eigh
    language: numpy
    difficulty: 3
    text: "w, V = np.linalg.eigh(S)"
    description: "Eig for symmetric/Hermitian — faster, real eigenvalues."

snippets:
  # ── creation ─────────────────────────────────────────────────────
  - id: tn-create-array
    structure: np_array
    language: numpy
    difficulty: 1
    text: "a = np.array([1, 2, 3])"
    description: "1-D array from a list."
    tags: [numpy, creation]
  - id: tn-create-array2d
    structure: np_array2d
    language: numpy
    difficulty: 2
    text: "M = np.array([[1, 2], [3, 4]])"
    description: "2-D array (matrix) from nested lists."
    tags: [numpy, creation, matrix]
  - id: tn-zeros
    structure: np_zeros
    language: numpy
    difficulty: 1
    text: "Z = np.zeros((3, 4))"
    description: "Float zeros of given shape."
    tags: [numpy, creation]
  - id: tn-ones
    structure: np_ones
    language: numpy
    difficulty: 1
    text: "O = np.ones((2, 3), dtype=int)"
    description: "Int ones of given shape."
    tags: [numpy, creation, dtype]
  - id: tn-empty
    structure: np_empty
    language: numpy
    difficulty: 1
    text: "E = np.empty((2, 2))"
    description: "Uninitialized buffer — fastest allocation."
    tags: [numpy, creation]
  - id: tn-full
    structure: np_full
    language: numpy
    difficulty: 2
    text: "F = np.full((3, 3), fill_value=7)"
    description: "Fill an array with a constant value."
    tags: [numpy, creation]
  - id: tn-eye
    structure: np_eye
    language: numpy
    difficulty: 1
    text: "I = np.eye(4)"
    description: "Identity matrix of size n."
    tags: [numpy, creation, linalg]
  - id: tn-identity
    structure: np_identity
    language: numpy
    difficulty: 1
    text: "I = np.identity(3)"
    description: "Square identity matrix."
    tags: [numpy, creation, linalg]
  - id: tn-arange
    structure: np_arange
    language: numpy
    difficulty: 1
    text: "r = np.arange(0, 10, 2)"
    description: "Range with step, like Python range but returns ndarray."
    tags: [numpy, creation]
  - id: tn-linspace
    structure: np_linspace
    language: numpy
    difficulty: 2
    text: "x = np.linspace(0, 1, 11)"
    description: "Evenly spaced floats from start to stop inclusive."
    tags: [numpy, creation]
  - id: tn-logspace
    structure: np_logspace
    language: numpy
    difficulty: 3
    text: "y = np.logspace(-3, 3, num=7)"
    description: "Evenly spaced on a log scale."
    tags: [numpy, creation]
  - id: tn-zeros-like
    structure: np_zeros_like
    language: numpy
    difficulty: 2
    text: "Z = np.zeros_like(A)"
    description: "Zeros with shape and dtype of A."
    tags: [numpy, creation]
  - id: tn-ones-like
    structure: np_ones_like
    language: numpy
    difficulty: 2
    text: "O = np.ones_like(A, dtype=float)"
    description: "Ones matching A's shape, override dtype."
    tags: [numpy, creation, dtype]

  # ── shape / reshape ──────────────────────────────────────────────
  - id: tn-shape
    structure: np_shape
    language: numpy
    difficulty: 1
    text: "rows, cols = A.shape"
    description: "Shape tuple unpacked."
    tags: [numpy, shape]
  - id: tn-ndim
    structure: np_ndim
    language: numpy
    difficulty: 1
    text: "d = A.ndim"
    description: "Number of axes."
    tags: [numpy, shape]
  - id: tn-size
    structure: np_size
    language: numpy
    difficulty: 1
    text: "n = A.size"
    description: "Total element count."
    tags: [numpy, shape]
  - id: tn-reshape
    structure: np_reshape
    language: numpy
    difficulty: 2
    text: "B = A.reshape(2, 3)"
    description: "Reshape without copying (view if contiguous)."
    tags: [numpy, shape]
  - id: tn-reshape-infer
    structure: np_reshape_infer
    language: numpy
    difficulty: 2
    text: "B = A.reshape(-1, 4)"
    description: "Infer rows so cols = 4."
    tags: [numpy, shape]
  - id: tn-flatten
    structure: np_flatten
    language: numpy
    difficulty: 1
    text: "v = A.flatten()"
    description: "1-D copy of all elements."
    tags: [numpy, shape]
  - id: tn-ravel
    structure: np_ravel
    language: numpy
    difficulty: 2
    text: "v = A.ravel()"
    description: "1-D view (no copy when possible)."
    tags: [numpy, shape]
  - id: tn-transpose-attr
    structure: np_T
    language: numpy
    difficulty: 1
    text: "B = A.T"
    description: "Transpose attribute."
    tags: [numpy, shape, matrix]
  - id: tn-transpose-fn
    structure: np_transpose
    language: numpy
    difficulty: 2
    text: "B = np.transpose(A, axes=(1, 0, 2))"
    description: "Reorder axes by permutation."
    tags: [numpy, shape, matrix]
  - id: tn-swapaxes
    structure: np_swapaxes
    language: numpy
    difficulty: 3
    text: "B = np.swapaxes(A, 0, 2)"
    description: "Swap two axes in place of full transpose."
    tags: [numpy, shape]
  - id: tn-moveaxis
    structure: np_moveaxis
    language: numpy
    difficulty: 3
    text: "B = np.moveaxis(A, source=0, destination=-1)"
    description: "Move one axis to a new position."
    tags: [numpy, shape]
  - id: tn-expand-dims
    structure: np_expand_dims
    language: numpy
    difficulty: 2
    text: "B = np.expand_dims(v, axis=1)"
    description: "Insert length-1 axis (e.g. row → column vector)."
    tags: [numpy, shape, broadcasting]
  - id: tn-squeeze
    structure: np_squeeze
    language: numpy
    difficulty: 2
    text: "B = np.squeeze(A, axis=0)"
    description: "Drop length-1 axes."
    tags: [numpy, shape]
  - id: tn-newaxis
    structure: np_newaxis
    language: numpy
    difficulty: 3
    text: "col = v[:, np.newaxis]"
    description: "Add new axis via fancy indexing — row → column."
    tags: [numpy, shape, broadcasting]

  # ── indexing & slicing ───────────────────────────────────────────
  - id: tn-idx-elem
    structure: np_idx_elem
    language: numpy
    difficulty: 1
    text: "x = A[0, 0]"
    description: "Scalar element at (row, col)."
    tags: [numpy, indexing]
  - id: tn-idx-row
    structure: np_idx_row
    language: numpy
    difficulty: 1
    text: "row = A[2]"
    description: "Single row by index."
    tags: [numpy, indexing]
  - id: tn-idx-col
    structure: np_idx_col
    language: numpy
    difficulty: 2
    text: "col = A[:, 1]"
    description: "Single column via full-row slice."
    tags: [numpy, indexing]
  - id: tn-slice-block
    structure: np_slice_block
    language: numpy
    difficulty: 3
    text: "sub = A[1:4, 2:5]"
    description: "Rectangular block slice (view)."
    tags: [numpy, indexing, slicing]
  - id: tn-stride
    structure: np_stride
    language: numpy
    difficulty: 3
    text: "every2 = A[::2, ::2]"
    description: "Step-2 slicing on both axes."
    tags: [numpy, indexing, slicing]
  - id: tn-reverse-rows
    structure: np_reverse_rows
    language: numpy
    difficulty: 2
    text: "B = A[::-1]"
    description: "Reverse along axis 0."
    tags: [numpy, indexing, slicing]
  - id: tn-fancy-rows
    structure: np_fancy_rows
    language: numpy
    difficulty: 3
    text: "rows = A[[0, 2, 4]]"
    description: "Fancy indexing — pick specific rows."
    tags: [numpy, indexing]
  - id: tn-fancy-grid
    structure: np_fancy_grid
    language: numpy
    difficulty: 3
    text: "vals = A[[0, 1], [2, 3]]"
    description: "Pair-wise fancy indexing — returns elements (0,2) and (1,3)."
    tags: [numpy, indexing]
  - id: tn-bool-mask
    structure: np_bool_mask
    language: numpy
    difficulty: 2
    text: "pos = A[A > 0]"
    description: "Boolean masking — keep positives."
    tags: [numpy, indexing, mask]
  - id: tn-bool-assign
    structure: np_bool_assign
    language: numpy
    difficulty: 3
    text: "A[A < 0] = 0"
    description: "In-place clip via mask assignment."
    tags: [numpy, indexing, mask]
  - id: tn-take
    structure: np_take
    language: numpy
    difficulty: 3
    text: "out = np.take(A, [0, 2, 5], axis=0)"
    description: "Take along an axis by integer indices."
    tags: [numpy, indexing]
  - id: tn-put
    structure: np_put
    language: numpy
    difficulty: 3
    text: "np.put(A, [0, 1, 2], [9, 9, 9])"
    description: "Write into flat positions in-place."
    tags: [numpy, indexing]
  - id: tn-where-cond
    structure: np_where
    language: numpy
    difficulty: 3
    text: "B = np.where(A > 0, A, 0)"
    description: "Conditional select — ReLU-style."
    tags: [numpy, indexing, mask]
  - id: tn-where-idx
    structure: np_where_idx
    language: numpy
    difficulty: 3
    text: "rows, cols = np.where(A == 0)"
    description: "Indices of matching positions."
    tags: [numpy, indexing, mask]
  - id: tn-nonzero
    structure: np_nonzero
    language: numpy
    difficulty: 2
    text: "idx = np.nonzero(v)"
    description: "Tuple of arrays with nonzero positions per axis."
    tags: [numpy, indexing, mask]
  - id: tn-argwhere
    structure: np_argwhere
    language: numpy
    difficulty: 3
    text: "pts = np.argwhere(A > 5)"
    description: "Coordinates (one row per match) where condition holds."
    tags: [numpy, indexing, mask]

  # ── stacking / splitting / concat ────────────────────────────────
  - id: tn-concat-rows
    structure: np_concat_rows
    language: numpy
    difficulty: 2
    text: "C = np.concatenate([A, B], axis=0)"
    description: "Concat along rows (stack vertically)."
    tags: [numpy, combine]
  - id: tn-concat-cols
    structure: np_concat_cols
    language: numpy
    difficulty: 2
    text: "C = np.concatenate([A, B], axis=1)"
    description: "Concat along cols (stack horizontally)."
    tags: [numpy, combine]
  - id: tn-vstack
    structure: np_vstack
    language: numpy
    difficulty: 2
    text: "C = np.vstack([A, B])"
    description: "Vertical stack — adds rows."
    tags: [numpy, combine]
  - id: tn-hstack
    structure: np_hstack
    language: numpy
    difficulty: 2
    text: "C = np.hstack([A, B])"
    description: "Horizontal stack — adds cols."
    tags: [numpy, combine]
  - id: tn-dstack
    structure: np_dstack
    language: numpy
    difficulty: 3
    text: "C = np.dstack([R, G, B])"
    description: "Depth stack — channels-last image."
    tags: [numpy, combine]
  - id: tn-stack-new
    structure: np_stack
    language: numpy
    difficulty: 3
    text: "C = np.stack([A, B], axis=0)"
    description: "Stack along a NEW axis (unlike concatenate)."
    tags: [numpy, combine]
  - id: tn-split-eq
    structure: np_split
    language: numpy
    difficulty: 3
    text: "parts = np.split(A, 3, axis=0)"
    description: "Split into N equal sub-arrays along axis."
    tags: [numpy, combine]
  - id: tn-array-split
    structure: np_array_split
    language: numpy
    difficulty: 3
    text: "parts = np.array_split(A, 4, axis=1)"
    description: "Like split but tolerates uneven sizes."
    tags: [numpy, combine]
  - id: tn-hsplit
    structure: np_hsplit
    language: numpy
    difficulty: 3
    text: "left, right = np.hsplit(A, [2])"
    description: "Split columns at given index."
    tags: [numpy, combine]
  - id: tn-vsplit
    structure: np_vsplit
    language: numpy
    difficulty: 3
    text: "top, bot = np.vsplit(A, [3])"
    description: "Split rows at given index."
    tags: [numpy, combine]
  - id: tn-tile
    structure: np_tile
    language: numpy
    difficulty: 3
    text: "T = np.tile(A, (2, 3))"
    description: "Repeat the block 2× along rows, 3× along cols."
    tags: [numpy, combine]
  - id: tn-repeat
    structure: np_repeat
    language: numpy
    difficulty: 3
    text: "r = np.repeat(v, 3)"
    description: "Repeat each element N times."
    tags: [numpy, combine]

  # ── arithmetic / element-wise ────────────────────────────────────
  - id: tn-add
    structure: np_add
    language: numpy
    difficulty: 1
    text: "C = A + B"
    description: "Element-wise add."
    tags: [numpy, arithmetic]
  - id: tn-sub
    structure: np_sub
    language: numpy
    difficulty: 1
    text: "D = A - B"
    description: "Element-wise subtract."
    tags: [numpy, arithmetic]
  - id: tn-mul-elem
    structure: np_mul_elem
    language: numpy
    difficulty: 1
    text: "E = A * B"
    description: "Element-wise multiply — NOT matmul."
    tags: [numpy, arithmetic]
  - id: tn-div
    structure: np_div
    language: numpy
    difficulty: 1
    text: "F = A / B"
    description: "Element-wise divide (float)."
    tags: [numpy, arithmetic]
  - id: tn-floordiv
    structure: np_floordiv
    language: numpy
    difficulty: 2
    text: "G = A // 2"
    description: "Element-wise floor divide."
    tags: [numpy, arithmetic]
  - id: tn-mod
    structure: np_mod
    language: numpy
    difficulty: 2
    text: "H = A % 3"
    description: "Element-wise modulo."
    tags: [numpy, arithmetic]
  - id: tn-pow
    structure: np_pow
    language: numpy
    difficulty: 1
    text: "P = A ** 2"
    description: "Element-wise power."
    tags: [numpy, arithmetic]
  - id: tn-scalar-broadcast
    structure: np_scalar_bcast
    language: numpy
    difficulty: 1
    text: "Q = A * 0.5 + 1"
    description: "Scalar broadcast — fused affine."
    tags: [numpy, arithmetic, broadcasting]
  - id: tn-clip
    structure: np_clip
    language: numpy
    difficulty: 2
    text: "C = np.clip(A, 0, 1)"
    description: "Bound element values to [lo, hi]."
    tags: [numpy, arithmetic]
  - id: tn-abs
    structure: np_abs
    language: numpy
    difficulty: 1
    text: "B = np.abs(A)"
    description: "Element-wise absolute value."
    tags: [numpy, arithmetic]
  - id: tn-sign
    structure: np_sign
    language: numpy
    difficulty: 2
    text: "S = np.sign(A)"
    description: "-1 / 0 / +1 per element."
    tags: [numpy, arithmetic]
  - id: tn-round
    structure: np_round
    language: numpy
    difficulty: 2
    text: "R = np.round(A, decimals=3)"
    description: "Round each element to N decimals."
    tags: [numpy, arithmetic]
  - id: tn-floor
    structure: np_floor
    language: numpy
    difficulty: 1
    text: "F = np.floor(A)"
    description: "Element-wise floor (toward -inf)."
    tags: [numpy, arithmetic]
  - id: tn-ceil
    structure: np_ceil
    language: numpy
    difficulty: 1
    text: "C = np.ceil(A)"
    description: "Element-wise ceiling (toward +inf)."
    tags: [numpy, arithmetic]

  # ── reductions / aggregations ────────────────────────────────────
  - id: tn-sum-all
    structure: np_sum_all
    language: numpy
    difficulty: 1
    text: "s = A.sum()"
    description: "Sum every element."
    tags: [numpy, reduce]
  - id: tn-sum-axis
    structure: np_sum_axis
    language: numpy
    difficulty: 2
    text: "col_sums = A.sum(axis=0)"
    description: "Sum down rows — one per column."
    tags: [numpy, reduce]
  - id: tn-mean-axis
    structure: np_mean_axis
    language: numpy
    difficulty: 2
    text: "row_means = A.mean(axis=1)"
    description: "Mean across columns — one per row."
    tags: [numpy, reduce]
  - id: tn-std
    structure: np_std
    language: numpy
    difficulty: 2
    text: "sigma = A.std(axis=0, ddof=1)"
    description: "Sample stddev per column (ddof=1)."
    tags: [numpy, reduce]
  - id: tn-var
    structure: np_var
    language: numpy
    difficulty: 2
    text: "var = A.var(axis=0)"
    description: "Population variance per column."
    tags: [numpy, reduce]
  - id: tn-min-max
    structure: np_min_max
    language: numpy
    difficulty: 2
    text: "lo, hi = A.min(), A.max()"
    description: "Global min / max."
    tags: [numpy, reduce]
  - id: tn-argmin
    structure: np_argmin
    language: numpy
    difficulty: 3
    text: "i = np.argmin(A, axis=0)"
    description: "Index of min along axis."
    tags: [numpy, reduce]
  - id: tn-argmax
    structure: np_argmax
    language: numpy
    difficulty: 3
    text: "j = np.argmax(A, axis=1)"
    description: "Index of max along axis."
    tags: [numpy, reduce]
  - id: tn-cumsum
    structure: np_cumsum
    language: numpy
    difficulty: 3
    text: "C = np.cumsum(A, axis=0)"
    description: "Running sum down rows."
    tags: [numpy, reduce]
  - id: tn-cumprod
    structure: np_cumprod
    language: numpy
    difficulty: 3
    text: "P = np.cumprod(v)"
    description: "Running product."
    tags: [numpy, reduce]
  - id: tn-prod
    structure: np_prod
    language: numpy
    difficulty: 2
    text: "p = np.prod(v)"
    description: "Product of all elements."
    tags: [numpy, reduce]
  - id: tn-any-all
    structure: np_any_all
    language: numpy
    difficulty: 2
    text: "ok = (A >= 0).all()"
    description: "Element-wise predicate then reduce."
    tags: [numpy, reduce, mask]
  - id: tn-count-nonzero
    structure: np_count_nonzero
    language: numpy
    difficulty: 2
    text: "n = np.count_nonzero(A > 0)"
    description: "Count truthy elements."
    tags: [numpy, reduce, mask]
  - id: tn-median
    structure: np_median
    language: numpy
    difficulty: 2
    text: "m = np.median(A, axis=1)"
    description: "Median per row."
    tags: [numpy, reduce]
  - id: tn-percentile
    structure: np_percentile
    language: numpy
    difficulty: 3
    text: "q = np.percentile(A, [25, 50, 75])"
    description: "Quartiles across all elements."
    tags: [numpy, reduce]

  # ── matrix / linear algebra ──────────────────────────────────────
  - id: tn-matmul
    structure: np_matmul
    language: numpy
    difficulty: 2
    text: "C = A @ B"
    description: "Matrix product (PEP 465 operator)."

snippets:
  # ── list comprehension ───────────────────────────────────────────
  - id: ts-listcomp-1
    structure: list_comp
    difficulty: 1
    text: "[x * 2 for x in nums]"
    tags: [comprehensions]
  - id: ts-listcomp-2
    structure: list_comp
    difficulty: 2
    text: "[n for n in nums if n > 0]"
    tags: [comprehensions, filter]
  - id: ts-listcomp-3
    structure: list_comp
    difficulty: 3
    text: "[(i, x) for i, x in enumerate(items)]"
    tags: [comprehensions, enumerate]
  - id: ts-listcomp-4
    structure: list_comp
    difficulty: 3
    text: "[w.lower() for w in words if w.isalpha()]"
    tags: [comprehensions, strings]

  # ── dict comprehension ───────────────────────────────────────────
  - id: ts-dictcomp-1
    structure: dict_comp
    difficulty: 1
    text: "{k: v for k, v in pairs}"
    tags: [comprehensions, dict]
  - id: ts-dictcomp-2
    structure: dict_comp
    difficulty: 2
    text: "{x: x * x for x in range(10)}"
    tags: [comprehensions, dict]
  - id: ts-dictcomp-3
    structure: dict_comp
    difficulty: 3
    text: "{k: v for k, v in d.items() if v}"
    tags: [comprehensions, dict, filter]

  # ── set & gen ────────────────────────────────────────────────────
  - id: ts-setcomp-1
    structure: set_comp
    difficulty: 3
    text: "{x.strip() for x in lines if x}"
    tags: [comprehensions, set]
  - id: ts-genexpr-1
    structure: gen_expr
    difficulty: 2
    text: "sum(x * x for x in nums)"
    tags: [generators]
  - id: ts-genexpr-2
    structure: gen_expr
    difficulty: 2
    text: "any(c.isdigit() for c in s)"
    tags: [generators]

  # ── lambda ───────────────────────────────────────────────────────
  - id: ts-lambda-1
    structure: lambda
    difficulty: 2
    text: "sorted(items, key=lambda x: x.name)"
    tags: [lambda, sorting]
  - id: ts-lambda-2
    structure: lambda
    difficulty: 3
    text: "list(filter(lambda n: n % 2 == 0, nums))"
    tags: [lambda, filter]
  - id: ts-lambda-3
    structure: lambda
    difficulty: 2
    text: "max(words, key=lambda w: len(w))"
    tags: [lambda]

  # ── with / context ───────────────────────────────────────────────
  - id: ts-withas-1
    structure: with_as
    difficulty: 3
    text: "with open(path, 'r', encoding='utf-8') as f:"

  - id: ts-withas-2
    structure: with_as
    difficulty: 2
    text: "with suppress(FileNotFoundError):"
    tags: [context-manager, exceptions]
  - id: ts-withas-3
    structure: with_as
    difficulty: 3
    text: "with contextlib.ExitStack() as stack:"
    tags: [context-manager]

  # ── try / except ─────────────────────────────────────────────────
  - id: ts-tryex-1
    structure: try_except
    difficulty: 2
    text: "except (KeyError, ValueError) as e:"
    tags: [exceptions]
  - id: ts-tryex-2
    structure: try_except
    difficulty: 3
    text: "raise ValueError(f'invalid: {x!r}') from e"
    tags: [exceptions, fstring]

  # ── def signature ────────────────────────────────────────────────
  - id: ts-def-1

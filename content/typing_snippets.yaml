snippets:
  # ── list comprehension ───────────────────────────────────────────
  - id: ts-listcomp-1
    structure: list_comp
    difficulty: 1
    text: "[x * 2 for x in nums]"
    tags: [comprehensions]
  - id: ts-listcomp-2
    structure: list_comp
    difficulty: 2
    text: "[n for n in nums if n > 0]"
    tags: [comprehensions, filter]
  - id: ts-listcomp-3
    structure: list_comp
    difficulty: 3
    text: "[(i, x) for i, x in enumerate(items)]"
    tags: [comprehensions, enumerate]
  - id: ts-listcomp-4
    structure: list_comp
    difficulty: 3
    text: "[w.lower() for w in words if w.isalpha()]"
    tags: [comprehensions, strings]

  # ── dict comprehension ───────────────────────────────────────────
